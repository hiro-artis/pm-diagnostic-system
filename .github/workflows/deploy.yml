name: Deploy to GCP and Vercel

on:
  push:
    branches:
      - main

env:
  LANG: ja_JP.UTF-8
  LC_ALL: ja_JP.UTF-8
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-northeast1
  DOCKER_IMAGE: pm-diagnostic-api

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build -t gcr.io/$PROJECT_ID/$DOCKER_IMAGE:$GITHUB_SHA \
                       -t gcr.io/$PROJECT_ID/$DOCKER_IMAGE:latest \
                       -f Dockerfile .

      - name: Push Docker image to GCR
        run: |
          docker push gcr.io/$PROJECT_ID/$DOCKER_IMAGE:$GITHUB_SHA
          docker push gcr.io/$PROJECT_ID/$DOCKER_IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy pm-diagnostic-api \
            --image gcr.io/$PROJECT_ID/$DOCKER_IMAGE:$GITHUB_SHA \
            --platform managed \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --set-env-vars PYTHONUNBUFFERED=1

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend
        run: |
          vercel deploy --prod \
            --token $VERCEL_TOKEN \
            --env NEXT_PUBLIC_API_BASE_URL=https://pm-diagnostic-api.run.app || true
