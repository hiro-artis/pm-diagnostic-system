name: Deploy to GCP and Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  LANG: ja_JP.UTF-8
  LC_ALL: ja_JP.UTF-8
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-northeast1
  DOCKER_IMAGE: pm-diagnostic-api

jobs:
  # 並行実行: GCP Cloud Run と Vercel へのデプロイ
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build -t gcr.io/$PROJECT_ID/$DOCKER_IMAGE:$GITHUB_SHA \
                       -t gcr.io/$PROJECT_ID/$DOCKER_IMAGE:latest \
                       -f Dockerfile .

      - name: Push Docker image to GCR
        run: |
          docker push gcr.io/$PROJECT_ID/$DOCKER_IMAGE:$GITHUB_SHA
          docker push gcr.io/$PROJECT_ID/$DOCKER_IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy pm-diagnostic-api \
            --image gcr.io/$PROJECT_ID/$DOCKER_IMAGE:$GITHUB_SHA \
            --platform managed \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --set-env-vars PYTHONUNBUFFERED=1

      - name: Log deployment URL
        run: |
          gcloud run services describe pm-diagnostic-api --region $GCP_REGION --format='value(status.url)'

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend
        run: |
          vercel deploy --prod \
            --token $VERCEL_TOKEN \
            --env NEXT_PUBLIC_API_BASE_URL=https://pm-diagnostic-api.run.app

  # デプロイ後の統合テスト
  integration-test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Wait for Cloud Run deployment
        run: |
          sleep 30
          curl -s https://pm-diagnostic-api.run.app/health || echo "API still deploying..."

      - name: Run health check tests
        run: |
          python -m pytest tests/integration/test_health.py -v || true

      - name: Run API endpoint tests
        run: |
          python -m pytest tests/integration/test_api_endpoints.py -v || true

  # Slack 通知
  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Send Slack message on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ PM協会テスト診断システム - デプロイ完了",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ デプロイ成功*\n\n🌐 Backend API: https://pm-diagnostic-api.run.app\n🌐 Frontend: https://pm-diagnostic.vercel.app\n\n📊 Commit: ${{ github.sha }}\n👤 Author: ${{ github.actor }}"
                  }
                }
              ]
            }

      - name: Send Slack message on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ PM協会テスト診断システム - デプロイ失敗",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ デプロイ失敗*\n\n📊 Commit: ${{ github.sha }}\n👤 Author: ${{ github.actor }}\n\n詳細: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
